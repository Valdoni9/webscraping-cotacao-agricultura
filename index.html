<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgroQuote — Cotações Agropecuárias</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#0f1a0a; --surface:#172010; --surface2:#1e2c14;
      --border:rgba(140,200,80,0.12); --green:#6db33f; --green-dim:#3d7020;
      --green-lit:#8fd458; --amber:#e8a020; --cream:#eef0e8; --muted:#7a8c6a;
      --up:#4ec96a; --dn:#e05050; --radius:10px;
    }
    html, body {
      font-size: 16px;
      background: var(--bg);
      color: var(--cream);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      width: 100%;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ── TICKER ── */
    .ticker-bar {
      width: 100%;
      height: 128px;
      background: rgba(8,14,4,0.99);
      border-bottom: 2px solid rgba(109,179,63,0.25);
      overflow: hidden;
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
    }
    .ticker-bar::before,
    .ticker-bar::after {
      content: '';
      position: absolute;
      top: 0; bottom: 0;
      width: 120px;
      z-index: 2;
      pointer-events: none;
    }
    .ticker-bar::before { left:0;  background: linear-gradient(to right, rgba(8,14,4,1), transparent); }
    .ticker-bar::after  { right:0; background: linear-gradient(to left,  rgba(8,14,4,1), transparent); }

    .ticker-track {
      display: inline-flex;
      align-items: center;
      white-space: nowrap;
      animation: ticker-move 45s linear infinite;
      will-change: transform;
    }
    .ticker-track:hover { animation-play-state: paused; }
    @keyframes ticker-move {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    .ticker-item {
      display: inline-flex;
      align-items: center;
      gap: 1.2rem;
      padding: 0 3.6rem;
      border-right: 1px solid rgba(140,200,80,0.12);
      line-height: 1;
    }
    .tk-sep {
      display: inline-block;
      width: 1px; height: 28px;
      background: rgba(140,200,80,0.15);
      margin: 0 0.2rem;
    }
    .tk-emoji { font-size: 2.8rem; }
    .tk-nome  {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .tk-valor {
      font-family: 'JetBrains Mono', monospace;
      font-size: 2.5rem;
      font-weight: 700;
      color: var(--cream);
      letter-spacing: -0.02em;
    }
    .tk-chg {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.9rem;
      font-weight: 700;
      padding: 0.4rem 1rem;
      border-radius: 5px;
    }
    .tk-chg.up  { color: var(--up);    background: rgba(78,201,106,.18); }
    .tk-chg.dn  { color: var(--dn);    background: rgba(224,80,80,.18);  }
    .tk-chg.neu { color: var(--muted); background: rgba(255,255,255,.05); }

    /* ── FILTROS ── */
    .filter-section {
      padding: 0.75rem 1.25rem 0;
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
    }
    .f-btn {
      padding: 0.3rem 0.85rem;
      border-radius: 99px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-family: 'Inter', sans-serif;
      font-size: 0.73rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.18s;
      white-space: nowrap;
    }
    .f-btn:hover  { border-color: var(--green); color: var(--green-lit); }
    .f-btn.active { background: var(--green-dim); border-color: var(--green); color: #fff; font-weight: 600; }

    /* ── HERO ── */
    .hero-strip {
      padding: 0.6rem 1.25rem 0.3rem;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.25rem;
    }
    .hero-strip h1 { font-weight: 600; color: var(--cream); opacity: 0.45; letter-spacing: 0.04em; text-transform: uppercase; font-size: 0.65rem; }
    .hero-strip .updated { font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; color: var(--amber); }

    /* ── GRID ── */
    main { padding: 0.5rem 1.25rem 2rem; }
    .grid { display: grid; gap: 0.75rem; grid-template-columns: 1fr; }
    @media(min-width:480px)  { .grid { grid-template-columns: repeat(2,1fr); } }
    @media(min-width:768px)  { .grid { grid-template-columns: repeat(3,1fr); } }
    @media(min-width:1100px) { .grid { grid-template-columns: repeat(4,1fr); } }

    /* ── CARD ── */
    .card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; transition:transform 0.2s,border-color 0.2s,box-shadow 0.2s; animation:fadeUp 0.4s ease both; }
    .card:hover { transform:translateY(-3px); border-color:rgba(140,200,80,0.28); box-shadow:0 8px 24px rgba(0,0,0,0.4); }
    @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    .card-head { display:flex; align-items:center; justify-content:space-between; padding:0.7rem 0.875rem 0.45rem; border-bottom:1px solid var(--border); }
    .card-id { display:flex; align-items:center; gap:0.5rem; }
    .card-emoji { font-size:1.05rem; width:27px; height:27px; display:flex; align-items:center; justify-content:center; background:var(--surface2); border-radius:6px; flex-shrink:0; }
    .card-name { font-size:0.68rem; font-weight:700; letter-spacing:0.07em; text-transform:uppercase; color:var(--muted); }
    .cat-badge { font-size:0.56rem; font-weight:600; padding:0.1rem 0.38rem; border-radius:4px; text-transform:uppercase; letter-spacing:0.06em; white-space:nowrap; }
    .cat-graos    { background:rgba(109,179,63,.15); color:var(--green-lit); border:1px solid rgba(109,179,63,.3); }
    .cat-proteina { background:rgba(232,160,32,.15); color:var(--amber);     border:1px solid rgba(232,160,32,.3); }
    .card-body { padding:0.55rem 0.875rem 0.7rem; }
    .indicador { padding:0.42rem 0; border-bottom:1px solid var(--border); }
    .indicador:last-child  { border-bottom:none; padding-bottom:0; }
    .indicador:first-child { padding-top:0; }
    .ind-label { font-size:0.6rem; color:var(--muted); margin-bottom:0.18rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .ind-row   { display:flex; align-items:center; justify-content:space-between; gap:0.5rem; }
    .ind-valor-wrap { display:flex; flex-direction:column; gap:0.07rem; }
    .ind-valor { font-family:'JetBrains Mono',monospace; font-size:1.18rem; font-weight:600; color:var(--cream); line-height:1; white-space:nowrap; }
    @media(max-width:479px) { .ind-valor { font-size:1rem; } }
    .ind-unit  { font-size:0.58rem; color:var(--amber); opacity:0.8; letter-spacing:0.02em; white-space:nowrap; }
    .ind-chg   { font-family:'JetBrains Mono',monospace; font-size:0.66rem; font-weight:600; padding:0.13rem 0.38rem; border-radius:4px; white-space:nowrap; flex-shrink:0; }
    .up  { background:rgba(78,201,106,.12); color:var(--up);  }
    .dn  { background:rgba(224,80,80,.12);  color:var(--dn);  }
    .neu { background:rgba(255,255,255,.05); color:var(--muted); }
    .ind-date  { font-size:0.56rem; color:var(--muted); opacity:0.55; margin-top:0.15rem; }
    .card-empty { padding:1.25rem 0.875rem; text-align:center; font-size:0.73rem; color:var(--muted); }

    #toast { position:fixed; bottom:1rem; right:1rem; z-index:999; padding:0.4rem 0.9rem; border-radius:8px; font-size:0.72rem; font-weight:500; pointer-events:none; transform:translateY(50px); opacity:0; transition:all 0.25s; }
    #toast.ok   { background:var(--green-dim); color:#fff; border:1px solid var(--green); }
    #toast.err  { background:rgba(224,80,80,.2); color:var(--dn); border:1px solid var(--dn); }
    #toast.show { transform:translateY(0); opacity:1; }

    footer { padding:1rem 1.25rem; border-top:1px solid var(--border); font-size:0.62rem; color:var(--muted); display:flex; flex-wrap:wrap; gap:0.5rem; align-items:center; justify-content:space-between; }
    footer a { color:var(--amber); text-decoration:none; }
    .empty-state { grid-column:1/-1; text-align:center; padding:3rem 1rem; color:var(--muted); font-size:0.85rem; }
  </style>
</head>
<body>

<div class="ticker-bar">
  <div class="ticker-track" id="ticker-track"></div>
</div>

<div class="filter-section" id="filter-bar"></div>
<div class="hero-strip">
  <h1>Cotações Agropecuárias — Tempo Real</h1>
  <span class="updated" id="gerado-em"></span>
</div>
<main><div class="grid" id="grid"></div></main>
<footer>
  <span>Fonte: <a href="https://www.noticiasagricolas.com.br/cotacoes/" target="_blank">Notícias Agrícolas / CEPEA</a> · <a href="https://olinda.bcb.gov.br" target="_blank">BCB</a></span>
  <span>Atualizado automaticamente 3× ao dia — seg a sex</span>
</footer>
<div id="toast"></div>

<script>
const PRODUTOS=[
  {id:'soja',    nome:'Soja',      emoji:'🫘', cat:'graos'   },
  {id:'milho',   nome:'Milho',     emoji:'🌽', cat:'graos'   },
  {id:'algodao', nome:'Algodão',   emoji:'🌿', cat:'graos'   },
  {id:'trigo',   nome:'Trigo',     emoji:'🌾', cat:'graos'   },
  {id:'arroz',   nome:'Arroz',     emoji:'🍚', cat:'graos'   },
  {id:'sorgo',   nome:'Sorgo',     emoji:'🌱', cat:'graos'   },
  {id:'boi',     nome:'Boi Gordo', emoji:'🐂', cat:'proteina'},
  {id:'frango',  nome:'Frango',    emoji:'🐔', cat:'proteina'},
  {id:'suinos',  nome:'Suínos',    emoji:'🐷', cat:'proteina'},
  {id:'leite',   nome:'Leite',     emoji:'🥛', cat:'proteina'},
];
const FILTROS=[{id:'todos',label:'Todos'},{id:'graos',label:'🌾 Grãos'},{id:'proteina',label:'🐄 Pecuária'}];
let dados=null, filtroAtivo='todos';

function toast(msg,tipo='ok'){const el=document.getElementById('toast');el.textContent=msg;el.className=tipo+' show';setTimeout(()=>el.className=tipo,2800);}

function parseVar(v){
  if(!v)return{cls:'neu',txt:'—'};
  const n=parseFloat(String(v).replace('%','').replace(',','.'));
  if(isNaN(n))return{cls:'neu',txt:v};
  const cls=n>0?'up':n<0?'dn':'neu';
  const s=n>0?'▲':n<0?'▼':'—';
  return{cls,txt:`${s} ${Math.abs(n).toFixed(2).replace('.',',')}%`};
}

function buildTicker(json){
  const track=document.getElementById('ticker-track');
  if(!track)return;
  const itens=[];
  PRODUTOS.forEach(meta=>{
    const ind=json[meta.id]?.indicadores?.find(i=>i.valor);
    if(!ind)return;
    itens.push({meta,valor:ind.valor,v:parseVar(ind.variacao)});
  });
  if(!itens.length)return;
  const make=({meta,valor,v})=>
    `<span class="ticker-item">`+
    `<span class="tk-emoji">${meta.emoji}</span>`+
    `<span class="tk-nome">${meta.nome}</span>`+
    `<span class="tk-valor">${valor}</span>`+
    `<span class="tk-chg ${v.cls}">${v.txt}</span>`+
    `</span>`;
  track.innerHTML=itens.map(make).join('')+itens.map(make).join('');
  requestAnimationFrame(()=>{
    const dur=Math.min(120,Math.max(30,(track.scrollWidth/2)/100));
    track.style.animationDuration=dur.toFixed(1)+'s';
  });
}

function buildFiltros(){
  const bar=document.getElementById('filter-bar');
  FILTROS.forEach(f=>{
    const btn=document.createElement('button');
    btn.className='f-btn'+(f.id===filtroAtivo?' active':'');
    btn.textContent=f.label;
    btn.onclick=()=>{document.querySelectorAll('.f-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');filtroAtivo=f.id;renderGrid();};
    bar.appendChild(btn);
  });
}

function makeCard(meta,dado,idx){
  const card=document.createElement('div');card.className='card';card.style.animationDelay=(idx*0.04).toFixed(2)+'s';
  const catCls=meta.cat==='graos'?'cat-graos':'cat-proteina';
  const catLabel=meta.cat==='graos'?'Grãos':'Pecuária';
  const head=document.createElement('div');head.className='card-head';
  head.innerHTML=`<div class="card-id"><div class="card-emoji">${meta.emoji}</div><div class="card-name">${meta.nome}</div></div><span class="cat-badge ${catCls}">${catLabel}</span>`;
  card.appendChild(head);
  const body=document.createElement('div');body.className='card-body';
  const inds=dado?.indicadores;
  if(!inds||!inds.length){body.innerHTML='<div class="card-empty">⏳ Aguardando dados…</div>';}
  else{inds.slice(0,3).forEach(ind=>{
    const v=parseVar(ind.variacao);
    const uc=ind.unidade?ind.unidade.replace(/^(valors*|preços*|fechamentos*)/i,'').trim():'';
    const d=document.createElement('div');d.className='indicador';
    d.innerHTML=`<div class="ind-label" title="${ind.indicador}">${ind.indicador}</div><div class="ind-row"><div class="ind-valor-wrap"><span class="ind-valor">${ind.valor||'—'}</span>${uc?`<span class="ind-unit">${uc}</span>`:''}</div><span class="ind-chg ${v.cls}">${v.txt}</span></div><div class="ind-date">${ind.data||''}</div>`;
    body.appendChild(d);
  });}
  card.appendChild(body);return card;
}

function renderGrid(){
  const grid=document.getElementById('grid');grid.innerHTML='';
  const json=dados?.dados||{};let idx=0;
  PRODUTOS.forEach(meta=>{if(filtroAtivo!=='todos'&&meta.cat!==filtroAtivo)return;grid.appendChild(makeCard(meta,json[meta.id],idx++));});
  if(!grid.children.length)grid.innerHTML='<div class="empty-state">Nenhum produto encontrado.</div>';
}

async function carregar(){
  try{
    const r=await fetch('./cotacoes.json?t='+Date.now());
    if(!r.ok)throw new Error('HTTP '+r.status);
    dados=await r.json();
    document.getElementById('gerado-em').textContent=dados.gerado_em||'—';
    renderGrid();buildTicker(dados.dados||{});
  }catch(e){
    toast('⚠ Falha ao carregar cotacoes.json','err');
    dados={dados:{}};renderGrid();
  }
}

buildFiltros();carregar();
</script>
</body>
</html>
