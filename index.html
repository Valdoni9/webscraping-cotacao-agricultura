<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AgroQuote — Sorriso/MT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080e05;--bg2:#0d1609;--card:#0f160a;--border:rgba(109,179,63,.18);
  --green:#6db33f;--green2:#8fd45a;--amber:#e8a020;--red:#e05050;
  --cream:#f0ead8;--muted:#6a7a5a;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{background:var(--bg);color:var(--cream);font-size:16px}
body{font-family:'Barlow Condensed',sans-serif;min-height:100vh;overflow-x:hidden}

/* ─── TICKER ─── */
.ticker-bar{
  width:100%;height:128px;
  background:rgba(4,8,2,.99);
  border-bottom:2px solid rgba(109,179,63,.25);
  overflow:hidden;position:sticky;top:0;z-index:100;
  display:flex;align-items:center;
}
.ticker-bar::before,.ticker-bar::after{
  content:'';position:absolute;top:0;bottom:0;width:120px;z-index:2;pointer-events:none;
}
.ticker-bar::before{left:0;background:linear-gradient(to right,rgba(4,8,2,1),transparent)}
.ticker-bar::after{right:0;background:linear-gradient(to left,rgba(4,8,2,1),transparent)}
.ticker-track{
  display:inline-flex;align-items:center;white-space:nowrap;
  animation:tmove 60s linear infinite;will-change:transform;
}
.ticker-track:hover{animation-play-state:paused}
@keyframes tmove{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.ticker-item{
  display:inline-flex;align-items:center;gap:1.2rem;
  padding:0 3.2rem;
  border-right:1px solid rgba(109,179,63,.12);
}
.tk-emoji{font-size:2.8rem;line-height:1}
.tk-nome{font-size:2rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--muted)}
.tk-valor{font-family:'JetBrains Mono',monospace;font-size:2.5rem;font-weight:700;color:var(--cream);letter-spacing:-.02em}
.tk-chg{font-size:1.9rem;font-weight:700;padding:.4rem 1rem;border-radius:3px;line-height:1}
.tk-chg.up{background:rgba(109,179,63,.2);color:var(--green2)}
.tk-chg.dn{background:rgba(224,80,80,.2);color:var(--red)}
.tk-chg.neu{color:var(--muted)}

/* ─── INFO BAR ─── */
.info-bar{
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem;
  padding:.5rem 1.4rem;background:var(--bg2);border-bottom:1px solid var(--border);
}
.info-left{display:flex;align-items:center;gap:1.2rem;flex-wrap:wrap}
.info-praca{font-size:1rem;font-weight:700;color:var(--green2);text-transform:uppercase;letter-spacing:.05em}
.info-data{font-size:.85rem;color:var(--muted)}
.info-dolar{font-family:'JetBrains Mono',monospace;font-size:1rem;font-weight:700;color:var(--amber)}
.info-right{display:flex;gap:.5rem;align-items:center}
.btn{
  font-family:'Barlow Condensed',sans-serif;
  font-size:.9rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;
  padding:.32rem .9rem;border-radius:3px;cursor:pointer;border:none;transition:all .15s;
}
.btn-outline{background:none;border:1px solid var(--border);color:var(--muted)}
.btn-outline:hover{border-color:var(--green);color:var(--green2)}
.btn-tv{background:rgba(109,179,63,.12);border:1px solid rgba(109,179,63,.3);color:var(--green2)}
.btn-tv:hover{background:rgba(109,179,63,.22)}

/* ─── FILTROS ─── */
.filter-bar{
  display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;
  padding:.55rem 1.4rem;border-bottom:1px solid var(--border);
}
.f-label{font-size:.78rem;color:var(--muted);font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-right:.2rem}
.fbtn{
  font-family:'Barlow Condensed',sans-serif;
  font-size:.9rem;font-weight:700;letter-spacing:.04em;
  padding:.25rem .8rem;border-radius:20px;
  border:1px solid var(--border);color:var(--muted);
  background:none;cursor:pointer;transition:all .15s;
}
.fbtn.active,.fbtn:hover{border-color:var(--green);color:var(--green2);background:rgba(109,179,63,.08)}

/* ─── CALCULADORA ─── */
.calc-wrap{
  margin:1rem 1.2rem .5rem;
  background:var(--card);border:1px solid var(--border);border-radius:6px;
  padding:.9rem 1.2rem 1rem;
}
.calc-title{font-size:1rem;font-weight:900;text-transform:uppercase;letter-spacing:.08em;color:var(--green2);margin-bottom:.7rem}
.calc-row{display:flex;flex-wrap:wrap;gap:.7rem;align-items:flex-end}
.cf{display:flex;flex-direction:column;gap:.22rem;flex:1;min-width:130px}
.cf label{font-size:.72rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted)}
.cf input,.cf select{
  background:var(--bg);border:1px solid var(--border);
  color:var(--cream);font-family:'JetBrains Mono',monospace;font-size:1.05rem;
  padding:.36rem .6rem;border-radius:3px;outline:none;width:100%;transition:border-color .15s;
}
.cf input:focus,.cf select:focus{border-color:var(--green)}
.cf select option{background:var(--bg2)}
.calc-res{
  flex:2;min-width:200px;
  background:rgba(109,179,63,.07);border:1px solid rgba(109,179,63,.28);
  border-radius:4px;padding:.55rem .9rem;
}
.calc-res-label{font-size:.72rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted)}
.calc-res-val{font-family:'JetBrains Mono',monospace;font-size:2rem;font-weight:700;color:var(--green2);line-height:1.1}
.calc-res-sub{font-size:.78rem;color:var(--muted);margin-top:.1rem}

/* ─── GRID ─── */
.grid-wrap{padding:.8rem 1.2rem 2rem}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:.65rem}

/* ─── CARDS ─── */
.card{
  background:var(--card);border:1px solid var(--border);border-radius:5px;
  padding:.85rem .95rem .75rem;
  display:flex;flex-direction:column;gap:.2rem;
  transition:border-color .2s,transform .15s;cursor:default;
}
.card:hover{border-color:rgba(109,179,63,.38);transform:translateY(-1px)}
.card-head{display:flex;align-items:center;justify-content:space-between}
.card-nome{font-size:1.05rem;font-weight:900;text-transform:uppercase;letter-spacing:.07em;color:var(--cream)}
.card-emoji{font-size:1.3rem;line-height:1}
.card-valor{
  font-family:'JetBrains Mono',monospace;
  font-size:2.1rem;font-weight:700;color:var(--cream);letter-spacing:-.02em;line-height:1;
}
.card-unit{font-size:.62rem;font-weight:700;color:var(--amber);letter-spacing:.04em;text-transform:uppercase}
.card-foot{display:flex;align-items:center;justify-content:space-between;margin-top:.15rem}
.card-var{font-size:.9rem;font-weight:700;padding:.14rem .48rem;border-radius:3px}
.card-var.up{background:rgba(109,179,63,.2);color:var(--green2)}
.card-var.dn{background:rgba(224,80,80,.15);color:var(--red)}
.card-var.neu{color:var(--muted)}
.card-praca{font-size:.68rem;color:var(--muted);font-weight:600}

/* ─── SPARKLINE ─── */
.spark-wrap{margin-top:.48rem;padding-top:.4rem;border-top:1px solid rgba(109,179,63,.1)}
.spark-header{
  display:flex;justify-content:space-between;align-items:center;
  font-size:.62rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;
  color:var(--muted);margin-bottom:.2rem;
}
.spark-range{font-family:'JetBrains Mono',monospace;color:var(--amber)}
canvas.spark{width:100%;height:30px;display:block}

/* ─── TV MODE ─── */
body.tv .info-bar,body.tv .filter-bar,body.tv .calc-wrap,body.tv footer{display:none!important}
body.tv{background:#020402;overflow:hidden}
body.tv .ticker-bar{height:200px;border-bottom:3px solid rgba(109,179,63,.4)}
body.tv .tk-emoji{font-size:5rem}
body.tv .tk-nome{font-size:3.4rem}
body.tv .tk-valor{font-size:5.5rem}
body.tv .tk-chg{font-size:3.4rem;padding:.6rem 1.6rem}
body.tv .ticker-item{padding:0 5rem;gap:1.8rem}
body.tv .grid{grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:.8rem}
body.tv .card{padding:1.1rem 1.2rem .9rem}
body.tv .card-nome{font-size:1.6rem}
body.tv .card-valor{font-size:3.6rem}
body.tv .card-unit{font-size:.85rem}
body.tv .card-var{font-size:1.4rem;padding:.22rem .6rem}
body.tv .card-praca{font-size:.9rem}
body.tv .spark-wrap{display:none}
body.tv .grid-wrap{padding:.6rem 1rem 1rem}
.tv-exit{
  display:none;position:fixed;top:.8rem;right:.8rem;z-index:999;
  background:rgba(109,179,63,.18);border:1px solid var(--green);
  color:var(--green2);font-family:'Barlow Condensed',sans-serif;
  font-size:1rem;font-weight:700;letter-spacing:.05em;
  padding:.4rem 1rem;border-radius:4px;cursor:pointer;
}

/* ─── FOOTER ─── */
footer{text-align:center;padding:.8rem 1rem;font-size:.72rem;color:var(--muted);border-top:1px solid var(--border)}

/* ─── TOAST ─── */
.toast{
  position:fixed;bottom:1.2rem;right:1.2rem;z-index:500;
  background:var(--card);border:1px solid var(--border);
  padding:.55rem 1rem;border-radius:4px;font-size:.88rem;color:var(--cream);
  opacity:0;transition:opacity .3s;pointer-events:none;
}
.toast.show{opacity:1}

@media(max-width:480px){.grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>

<!-- TICKER -->
<div class="ticker-bar"><div class="ticker-track" id="ttrack"></div></div>

<!-- INFO BAR -->
<div class="info-bar">
  <div class="info-left">
    <span class="info-praca">📍 Sorriso/MT</span>
    <span class="info-data" id="gerado-em">—</span>
    <span class="info-dolar" id="dolar-val">USD —</span>
  </div>
  <div class="info-right">
    <button class="btn btn-outline" onclick="atualizar()">↻ Atualizar</button>
    <button class="btn btn-tv" onclick="entrarTV()">📺 Modo TV</button>
  </div>
</div>

<!-- FILTROS -->
<div class="filter-bar">
  <span class="f-label">Ver:</span>
  <button class="fbtn active" data-cat="todos" onclick="setFiltro(this)">Todos</button>
  <button class="fbtn" data-cat="graos" onclick="setFiltro(this)">🌾 Grãos</button>
  <button class="fbtn" data-cat="pecuaria" onclick="setFiltro(this)">🐄 Pecuária</button>
  <button class="fbtn" data-cat="outros" onclick="setFiltro(this)">☕ Outros</button>
</div>

<!-- CALCULADORA -->
<div class="calc-wrap">
  <div class="calc-title">🧮 Calculadora de Receita</div>
  <div class="calc-row">
    <div class="cf">
      <label>Produto</label>
      <select id="calc-prod" onchange="onProdChange()">
        <option value="soja">Soja 🫘</option>
        <option value="milho">Milho 🌽</option>
        <option value="algodao">Algodão 🌿</option>
        <option value="trigo">Trigo 🌾</option>
        <option value="boi">Boi Gordo 🐂</option>
      </select>
    </div>
    <div class="cf">
      <label>Quantidade</label>
      <input type="number" id="calc-qtd" value="1000" min="1" step="100" oninput="calcular()">
    </div>
    <div class="cf">
      <label>Unidade</label>
      <select id="calc-unit" onchange="calcular()">
        <option value="sacas">Sacas</option>
        <option value="ton">Toneladas</option>
        <option value="arrobas">Arrobas</option>
      </select>
    </div>
    <div class="cf">
      <label>Preço/saca (R$)</label>
      <input type="number" id="calc-preco" step="0.50" oninput="calcular()" placeholder="automático">
    </div>
    <div class="calc-res">
      <div class="calc-res-label">Receita Total</div>
      <div class="calc-res-val" id="calc-total">—</div>
      <div class="calc-res-sub" id="calc-sub">Selecione produto e quantidade</div>
    </div>
  </div>
</div>

<!-- GRID -->
<div class="grid-wrap">
  <div class="grid" id="grid"></div>
</div>

<footer>Fonte: Agrolink · Notícias Agrícolas · CEPEA/ESALQ · Câmbio BCB/PTAX · Referência Sorriso/MT</footer>

<button class="tv-exit" id="tv-exit-btn" onclick="sairTV()">✕ Sair do Modo TV</button>
<div class="toast" id="toast"></div>

<script>
const PRODUTOS = [
  {id:'soja',    nome:'Soja',         emoji:'🫘', cat:'graos',    spt:16.67},
  {id:'milho',   nome:'Milho',        emoji:'🌽', cat:'graos',    spt:16.67},
  {id:'algodao', nome:'Algodão',      emoji:'🌿', cat:'graos',    spt:null},
  {id:'trigo',   nome:'Trigo',        emoji:'🌾', cat:'graos',    spt:16.67},
  {id:'arroz',   nome:'Arroz',        emoji:'🍚', cat:'graos',    spt:20},
  {id:'sorgo',   nome:'Sorgo',        emoji:'🌱', cat:'graos',    spt:16.67},
  {id:'boi',     nome:'Boi Gordo',    emoji:'🐂', cat:'pecuaria', spt:null},
  {id:'frango',  nome:'Frango',       emoji:'🐔', cat:'pecuaria', spt:null},
  {id:'suinos',  nome:'Suínos',       emoji:'🐷', cat:'pecuaria', spt:null},
  {id:'leite',   nome:'Leite',        emoji:'🥛', cat:'pecuaria', spt:null},
  {id:'cafe',    nome:'Café',         emoji:'☕', cat:'outros',   spt:16.67},
  {id:'sucroenergetico',nome:'Açúcar/Etanol',emoji:'🌿',cat:'outros',spt:null},
  {id:'laranja', nome:'Laranja',      emoji:'🍊', cat:'outros',   spt:null},
];
const TICKER_IDS = ['soja','milho','algodao','trigo','arroz','sorgo','boi','frango','suinos','leite'];

let dados = {};
let filtroAtivo = 'todos';

// ── HISTÓRICO ──
function salvarHist(dadosObj) {
  const hoje = new Date().toISOString().slice(0,10);
  let h = {};
  try { h = JSON.parse(localStorage.getItem('aqh') || '{}'); } catch(e){}
  for (const [id, d] of Object.entries(dadosObj||{})) {
    const inds = d?.indicadores;
    if (!inds?.length) continue;
    const v = parseFloat((inds[0].valor||'').replace(',','.'));
    if (isNaN(v)) continue;
    if (!h[id]) h[id] = [];
    const last = h[id][h[id].length-1];
    if (last?.d === hoje) last.v = v;
    else h[id].push({d:hoje, v});
    if (h[id].length > 30) h[id] = h[id].slice(-30);
  }
  try { localStorage.setItem('aqh', JSON.stringify(h)); } catch(e){}
  return h;
}
function loadHist() {
  try { return JSON.parse(localStorage.getItem('aqh') || '{}'); } catch(e){ return {}; }
}

// ── SPARKLINE ──
function drawSpark(canvas, pts) {
  if (!canvas || pts.length < 2) return;
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.offsetWidth || 160, H = 30;
  canvas.width = W*dpr; canvas.height = H*dpr;
  canvas.style.width = W+'px'; canvas.style.height = H+'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  const vals = pts.map(p=>p.v);
  const mn = Math.min(...vals), mx = Math.max(...vals), rng = mx-mn||1;
  const xS = W/(pts.length-1);
  const coords = pts.map((p,i)=>({x:i*xS, y:H-((p.v-mn)/rng)*(H-4)-2}));
  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'rgba(109,179,63,.35)');
  g.addColorStop(1,'rgba(109,179,63,.03)');
  ctx.beginPath();
  ctx.moveTo(coords[0].x,H);
  coords.forEach(c=>ctx.lineTo(c.x,c.y));
  ctx.lineTo(coords[coords.length-1].x,H);
  ctx.closePath();
  ctx.fillStyle=g; ctx.fill();
  ctx.beginPath();
  coords.forEach((c,i)=>i?ctx.lineTo(c.x,c.y):ctx.moveTo(c.x,c.y));
  ctx.strokeStyle='#6db33f'; ctx.lineWidth=1.5; ctx.stroke();
  const lp = coords[coords.length-1];
  ctx.beginPath(); ctx.arc(lp.x,lp.y,3,0,Math.PI*2);
  ctx.fillStyle='#8fd45a'; ctx.fill();
}

// ── VARIAÇÃO ──
function pv(v){ return parseFloat(String(v||0).replace(',','.').replace(/[^0-9.\-]/g,'')); }
function cls(v){ const n=pv(v); return n>0?'up':n<0?'dn':'neu'; }
function fmt(v){
  if(!v||v==='-'||v==='') return '–';
  const n=pv(v), a=Math.abs(n);
  const dec = String(v).replace(',','.').trim().includes('.') ?
    (String(v).replace(',','.').split('.')[1]?.length||2) : 2;
  if(n>0) return `▲ ${a.toFixed(dec)}`;
  if(n<0) return `▼ ${a.toFixed(dec)}`;
  return '– 0';
}
function limUnit(u){ return (u||'').replace(/^(valor\s*|preço\s*|fechamento\s*)/i,'').trim(); }

// ── TICKER ──
function buildTicker() {
  const items = TICKER_IDS.map(id => {
    const p = PRODUTOS.find(x=>x.id===id);
    const d = dados.dados?.[id];
    if (!d?.indicadores?.length) return '';
    const ind = d.indicadores[0];
    const valorNum = parseFloat((ind.valor||'').replace(',','.'));
    if (!ind.valor || isNaN(valorNum)) return ''; // sem cotação, omite do ticker
    const c = cls(ind.variacao);
    return `<span class="ticker-item">
      <span class="tk-emoji">${p.emoji}</span>
      <span class="tk-nome">${p.nome}</span>
      <span class="tk-valor">${ind.valor||'—'}</span>
      <span class="tk-chg ${c}">${fmt(ind.variacao)}</span>
    </span>`;
  }).join('');
  const cam = dados.dados?.cambio?.indicadores?.[0];
  const camItem = cam ? `<span class="ticker-item">
    <span class="tk-emoji">💵</span>
    <span class="tk-nome">Dólar</span>
    <span class="tk-valor">${cam.valor}</span>
    <span class="tk-chg neu">BRL/USD</span>
  </span>` : '';
  const full = items + camItem;
  document.getElementById('ttrack').innerHTML = full + full;
}

// ── GRID ──
function renderGrid() {
  const grid = document.getElementById('grid');
  const hist = loadHist();
  grid.innerHTML = '';
  const lista = PRODUTOS.filter(p => filtroAtivo==='todos' || p.cat===filtroAtivo);
  lista.forEach(p => {
    const d = dados.dados?.[p.id];
    const card = document.createElement('div');
    card.className = 'card'; card.dataset.cat = p.cat;
    if (!d?.indicadores?.length) {
      card.innerHTML = `
        <div class="card-head">
          <span class="card-nome">${p.nome}</span>
          <span class="card-emoji">${p.emoji}</span>
        </div>
        <div class="card-valor" style="color:var(--muted)">—</div>
        <div class="card-unit">Sem cotação hoje</div>`;
    } else {
      const ind = d.indicadores[0];
      // Verifica se o valor é numérico (ignora "s/ cotação", "-", etc.)
      const valorNum = parseFloat((ind.valor||'').replace(',','.'));
      const semCotacao = !ind.valor || isNaN(valorNum) || ind.valor.trim() === '-';
      if (semCotacao) {
        card.innerHTML = `
          <div class="card-head">
            <span class="card-nome">${p.nome}</span>
            <span class="card-emoji">${p.emoji}</span>
          </div>
          <div class="card-valor" style="color:var(--muted)">—</div>
          <div class="card-unit">Sem cotação hoje</div>`;
        grid.appendChild(card);
        return;
      }
      const c = cls(ind.variacao);
      const unit = limUnit(ind.unidade);
      const praca = (ind.indicador||'').includes('Sorriso') ? 'Sorriso/MT' : (ind.indicador||'');
      const pts = hist[p.id]||[];
      const hasHist = pts.length >= 2;
      const minV = hasHist ? Math.min(...pts.map(x=>x.v)).toFixed(2) : '—';
      const maxV = hasHist ? Math.max(...pts.map(x=>x.v)).toFixed(2) : '—';
      card.innerHTML = `
        <div class="card-head">
          <span class="card-nome">${p.nome}</span>
          <span class="card-emoji">${p.emoji}</span>
        </div>
        <div class="card-valor">${ind.valor||'—'}</div>
        ${unit ? `<div class="card-unit">${unit}</div>` : ''}
        <div class="card-foot">
          <span class="card-var ${c}">${fmt(ind.variacao)}</span>
          <span class="card-praca">${praca}</span>
        </div>
        ${hasHist ? `
        <div class="spark-wrap">
          <div class="spark-header">
            <span>Histórico ${pts.length}d</span>
            <span class="spark-range">${minV} – ${maxV}</span>
          </div>
          <canvas class="spark" id="sp-${p.id}"></canvas>
        </div>` : ''}`;
    }
    grid.appendChild(card);
  });
  requestAnimationFrame(() => {
    PRODUTOS.forEach(p => {
      const pts = loadHist()[p.id]||[];
      if (pts.length>=2) { const c=document.getElementById(`sp-${p.id}`); if(c) drawSpark(c,pts); }
    });
  });
}

// ── CALCULADORA ──
function getPrecoAuto(prodId) {
  const d = dados.dados?.[prodId];
  if (!d?.indicadores?.length) return null;
  const v = parseFloat((d.indicadores[0].valor||'').replace(',','.'));
  return isNaN(v) ? null : v;
}
function calcular() {
  const prodId = document.getElementById('calc-prod').value;
  const qtd    = parseFloat(document.getElementById('calc-qtd').value)||0;
  const unit   = document.getElementById('calc-unit').value;
  let preco    = parseFloat(String(document.getElementById('calc-preco').value||'').replace(',','.'));
  if (!preco||isNaN(preco)) {
    preco = getPrecoAuto(prodId);
    if (preco) document.getElementById('calc-preco').placeholder = preco.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
  }
  const prod = PRODUTOS.find(p=>p.id===prodId);
  const tot = document.getElementById('calc-total');
  const sub = document.getElementById('calc-sub');
  if (!preco||isNaN(preco)||!qtd) { tot.textContent='—'; sub.textContent='Selecione produto e quantidade'; return; }
  let sacas = qtd;
  if (unit==='ton' && prod?.spt) sacas = qtd*prod.spt;
  if (unit==='arrobas') sacas = qtd/2;
  const total = sacas*preco;
  const camV = parseFloat((dados.dados?.cambio?.indicadores?.[0]?.valor||'').replace(',','.'));
  tot.textContent = 'R$ '+total.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
  let s = `${sacas.toLocaleString('pt-BR',{maximumFractionDigits:0})} sacas × R$ ${preco.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2})}`;
  if (camV) s += ` · US$ ${(total/camV).toLocaleString('pt-BR',{maximumFractionDigits:0})}`;
  sub.textContent = s;
}
function onProdChange() { document.getElementById('calc-preco').value=''; document.getElementById('calc-preco').placeholder='automático'; calcular(); }

// ── FILTROS ──
function setFiltro(btn) {
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  filtroAtivo = btn.dataset.cat;
  renderGrid();
}

// ── TV ──
function entrarTV()  { document.body.classList.add('tv');    document.getElementById('tv-exit-btn').style.display='flex'; }
function sairTV()    { document.body.classList.remove('tv'); document.getElementById('tv-exit-btn').style.display='none'; }

// ── TOAST ──
function toast(m,t='ok') {
  const el=document.getElementById('toast');
  el.textContent=m; el.style.borderColor=t==='err'?'var(--red)':'var(--green)';
  el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),2800);
}

// ── CARREGAR ──
async function atualizar() {
  try {
    const r = await fetch('./cotacoes.json?t='+Date.now());
    if (!r.ok) throw new Error('HTTP '+r.status);
    dados = await r.json();
    // normaliza boi-gordo → boi
    if (dados.dados?.['boi-gordo'] && !dados.dados?.boi)
      dados.dados.boi = dados.dados['boi-gordo'];
    document.getElementById('gerado-em').textContent =
      dados.gerado_em ? 'Atualizado: '+dados.gerado_em : '';
    const camV = dados.dados?.cambio?.indicadores?.[0]?.valor || dados.cambio_usd_brl || '—';
    document.getElementById('dolar-val').textContent = 'USD R$ '+camV;
    salvarHist(dados.dados||{});
    buildTicker();
    renderGrid();
    calcular();
    toast('Cotações atualizadas ✓');
  } catch(e) {
    toast('⚠ Falha ao carregar cotacoes.json','err');
    renderGrid();
  }
}

atualizar();
window.addEventListener('resize', () => {
  PRODUTOS.forEach(p => {
    const pts = loadHist()[p.id]||[];
    if (pts.length>=2) { const c=document.getElementById(`sp-${p.id}`); if(c) drawSpark(c,pts); }
  });
});
</script>
