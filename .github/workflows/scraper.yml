name: Atualiza Cotacoes Agricolas

on:
  schedule:
    - cron: '0 11 * * 1-5'
    - cron: '0 15 * * 1-5'
    - cron: '0 20 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instala dependencias
        run: pip install requests beautifulsoup4

      - name: Roda scraper
        run: python scraper.py

      - name: Commit cotacoes.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cotacoes.json
          git diff --cached --quiet || git commit -m "chore: cotacoes $(date '+%d/%m/%Y %H:%M')"
          git push
